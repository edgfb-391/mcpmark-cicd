name: Issue Management Automation
on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Run issue triage script
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body ? context.payload.issue.body.toLowerCase() : '';

            // List of required labels to create if they don't exist
            const requiredLabels = [
              // Category labels
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '0056ff', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fef2c0', description: 'Maintenance and housekeeping tasks' },
              // Priority labels
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'fbca04', description: 'Medium priority issue' },
              { name: 'priority-low', color: '0e8a16', description: 'Low priority issue' },
              // Status labels
              { name: 'needs-triage', color: 'e99695', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: 'c5def5', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '1d76db', description: 'Issue created by first-time contributor' }
            ];

            // Create required labels if they don't exist
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: issue.owner,
                  repo: issue.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: issue.owner,
                    repo: issue.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  console.log(`Created label: ${label.name}`);
                } else {
                  console.error(`Error checking/creating label ${label.name}:`, error);
                }
              }
            }

            // Add needs-triage label if not already present
            const currentLabels = context.payload.issue.labels.map(l => l.name.toLowerCase());
            if (!currentLabels.includes('needs-triage')) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: ['needs-triage']
              });
              console.log('Added needs-triage label');
            }

            // Assign category label based on title
            let categoryLabel = null;
            if (title.includes('bug')) {
              categoryLabel = 'bug';
            } else if (title.includes('epic')) {
              categoryLabel = 'epic';
            } else if (title.includes('maintenance')) {
              categoryLabel = 'maintenance';
            }

            if (categoryLabel && !currentLabels.includes(categoryLabel)) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: [categoryLabel]
              });
              console.log(`Added category label: ${categoryLabel}`);
            }

            // Assign priority label based on title/body (highest priority wins)
            const priorityKeywords = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];

            let priorityLabel = 'priority-medium'; // Default
            for (const { keywords, label } of priorityKeywords) {
              const hasKeyword = keywords.some(k => title.includes(k) || body.includes(k));
              if (hasKeyword) {
                priorityLabel = label;
                break;
              }
            }

            if (!currentLabels.includes(priorityLabel)) {
              // Remove existing priority labels
              const existingPriorityLabels = currentLabels.filter(l => l.startsWith('priority-'));
              if (existingPriorityLabels.length > 0) {
                await github.rest.issues.removeLabels({
                  owner: issue.owner,
                  repo: issue.repo,
                  issue_number: issue.number,
                  labels: existingPriorityLabels
                });
                console.log(`Removed existing priority labels: ${existingPriorityLabels.join(', ')}`);
              }
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: [priorityLabel]
              });
              console.log(`Added priority label: ${priorityLabel}`);
            }

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Run task breakdown script
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const originalTitle = context.payload.issue.title;
            const parentNumber = issue.number;

            // Subtask details
            const subtasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            // Create sub-issues
            const subtaskNumbers = [];
            for (let i = 0; i < subtasks.length; i++) {
              const taskNumber = i + 1;
              const subtaskTitle = `[SUBTASK] ${originalTitle} - Task ${taskNumber}: ${subtasks[i].name}`;
              const subtaskBody = `Related to #${parentNumber}`;

              try {
                const response = await github.rest.issues.create({
                  owner: issue.owner,
                  repo: issue.repo,
                  title: subtaskTitle,
                  body: subtaskBody,
                  labels: ['enhancement', 'needs-review']
                });
                subtaskNumbers.push(response.data.number);
                console.log(`Created sub-issue #${response.data.number}: ${subtaskTitle}`);
              } catch (error) {
                console.error(`Error creating sub-issue ${taskNumber}:`, error);
              }
            }

            // Update parent issue body with Epic Tasks checklist
            const parentBody = context.payload.issue.body || '';
            const epicTasksSection = `\n\n## Epic Tasks\n${subtaskNumbers.map(num => `- [ ] #${num}`).join('\n')}`;
            const updatedBody = parentBody + epicTasksSection;

            try {
              await github.rest.issues.update({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: parentNumber,
                body: updatedBody
              });
              console.log(`Updated parent issue #${parentNumber} with Epic Tasks checklist`);
            } catch (error) {
              console.error(`Error updating parent issue body:`, error);
            }

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    steps:
      - name: Run auto-response script
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const author = context.payload.issue.user.login;
            const currentLabels = context.payload.issue.labels.map(l => l.name.toLowerCase());

            // Check if author is first-time contributor in this repo
            try {
              const response = await github.rest.issues.listForRepo({
                owner: issue.owner,
                repo: issue.repo,
                author: author,
                state: 'all'
              });
              const authorIssues = response.data;
              if (authorIssues.length === 1) {
                // First issue in this repo
                if (!currentLabels.includes('first-time-contributor')) {
                  await github.rest.issues.addLabels({
                    owner: issue.owner,
                    repo: issue.repo,
                    issue_number: issue.number,
                    labels: ['first-time-contributor']
                  });
                  console.log('Added first-time-contributor label');
                }
              }
            } catch (error) {
              console.error(`Error checking author's issues:`, error);
            }

            // Determine issue type for response
            let issueType = null;
            if (currentLabels.includes('bug')) {
              issueType = 'bug';
            } else if (currentLabels.includes('epic')) {
              issueType = 'epic';
            } else if (currentLabels.includes('maintenance')) {
              issueType = 'maintenance';
            }

            // Post auto-response comment
            let commentBody = '';
            if (issueType === 'bug') {
              commentBody = `Thank you for reporting this bug! Please review our [Bug Report Guidelines](.github/ISSUE_TEMPLATE/bug_report.md) to ensure we have all the necessary information to resolve this issue quickly.`;
            } else if (issueType === 'epic') {
              commentBody = `Thank you for submitting this epic! We've created 4 sub-tasks to break down this work. Please review our [Feature Request Process](.github/ISSUE_TEMPLATE/feature_request.md) for more details on how we handle large features.`;
            } else if (issueType === 'maintenance') {
              commentBody = `Thank you for submitting this maintenance task! Please review our [Maintenance Guidelines](.github/ISSUE_TEMPLATE/maintenance_report.md) to ensure we have all the necessary details.`;
            }

            if (commentBody) {
              try {
                await github.rest.issues.createComment({
                  owner: issue.owner,
                  repo: issue.repo,
                  issue_number: issue.number,
                  body: commentBody
                });
                console.log(`Posted auto-response comment for ${issueType} issue`);
              } catch (error) {
                console.error(`Error posting auto-response comment:`, error);
              }
            }

            // Set milestone for high/critical priority issues
            if (currentLabels.includes('priority-high') || currentLabels.includes('priority-critical')) {
              try {
                // Check if milestone v1.0.0 exists
                let milestoneId = null;
                const milestonesResponse = await github.rest.issues.listMilestones({
                  owner: issue.owner,
                  repo: issue.repo,
                  state: 'all'
                });
                const milestone = milestonesResponse.data.find(m => m.title === 'v1.0.0');
                if (milestone) {
                  milestoneId = milestone.number;
                } else {
                  // Create milestone if it doesn't exist
                  const createMilestoneResponse = await github.rest.issues.createMilestone({
                    owner: issue.owner,
                    repo: issue.repo,
                    title: 'v1.0.0',
                    description: 'Version 1.0.0 release'
                  });
                  milestoneId = createMilestoneResponse.data.number;
                  console.log(`Created milestone v1.0.0`);
                }

                // Assign milestone
                await github.rest.issues.update({
                  owner: issue.owner,
                  repo: issue.repo,
                  issue_number: issue.number,
                  milestone: milestoneId
                });
                console.log(`Assigned milestone v1.0.0`);
              } catch (error) {
                console.error(`Error setting milestone:`, error);
              }
            }

            // Change status from needs-triage to needs-review
            if (currentLabels.includes('needs-triage')) {
              try {
                await github.rest.issues.removeLabels({
                  owner: issue.owner,
                  repo: issue.repo,
                  issue_number: issue.number,
                  labels: ['needs-triage']
                });
                await github.rest.issues.addLabels({
                  owner: issue.owner,
                  repo: issue.repo,
                  issue_number: issue.number,
                  labels: ['needs-review']
                });
                console.log(`Changed status from needs-triage to needs-review`);
              } catch (error) {
                console.error(`Error updating status labels:`, error);
              }
            }
